<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      padding: 14px;
      color: #202124;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1765cc; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #5f6368;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>顯示縮放自訂</h1>

  <label for="displaySelect">選擇螢幕</label>
  <select id="displaySelect"></select>

  <label for="zoomInput">縮放百分比 (例如 300 代表 300%)</label>
  <input type="number" id="zoomInput" min="10" max="500" step="1" value="300">

  <button id="applyBtn">套用</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
